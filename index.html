// Mirrors the formatting commitEditField() applies to manually-edited numeric cells,
// so imported and hand-edited values render identically.
function formatImportedNumber(raw) {
  const num = typeof raw === "number" ? raw : parseFloat(String(raw).replace(/,/g, ""));
  if (isNaN(num)) return "";
  const hasDecimal = num % 1 !== 0;
  return num.toLocaleString("en-US", { maximumFractionDigits: 2, minimumFractionDigits: hasDecimal ? 2 : 0 });
}

function findMissingImportColumns(sheetRows) {
  if (!sheetRows.length) return IMPORT_COLUMNS.map(([header]) => header);
  const headers = Object.keys(sheetRows[0]);
  return IMPORT_COLUMNS.filter(([header]) => !headers.includes(header)).map(([header]) => header);
}

// Every header this app recognizes by name — anything else in the sheet is "unknown" to it.
function knownImportHeaders() {
  return IMPORT_COLUMNS.map(([header]) => header)
    .concat(OPTIONAL_IMPORT_COLUMNS.map(([header]) => header))
    .concat([DOCUMENT_ID_HEADER]);
}

function parseImportedRows(sheetRows) {
  const known = knownImportHeaders();
  const passthroughHeaders = sheetRows.length ? Object.keys(sheetRows[0]).filter(h => !known.includes(h)) : [];

  return sheetRows.map((raw, idx) => {
    const row = { id: idx + 1 };
    IMPORT_COLUMNS.forEach(([header, field]) => {
      let value = raw[header] !== undefined ? raw[header] : "";
      if (IMPORT_NUMERIC_FIELDS.includes(field)) value = formatImportedNumber(value);
      else if (field === "confidence") value = Math.round(Math.max(0, Math.min(100, Number(value) || 0)));
      // IT's real file uses "Exact Match" (not the shorter "Exact" this app's mock data uses
      // internally) — match on a leading "exact" so both forms, and a blank/unmatched Match
      // Type (seen in real data: ~1% of rows where IT's model found no candidate at all), work.
      // A blank/no-match row falls into "Fuzzy" here; `need_review` (always "Need Review" for
      // these) is what actually forces the review flag, this is just the badge text.
      else if (field === "matchType") value = /^exact/i.test(String(value).trim()) ? "Exact" : "Fuzzy";
      else if (field === "characterErrorRate") value = value === "" || value === undefined ? NaN : Number(value);
      else if (field === "needReviewRaw") value = value === undefined || value === null ? "" : String(value).trim();
      row[field] = value;
    });

    OPTIONAL_IMPORT_COLUMNS.forEach(([header, field]) => {
      const rawValue = raw[header];
      if (rawValue === undefined || rawValue === null || String(rawValue).trim() === "") {
        row[field] = undefined;
        return;
      }
      const numeric = formatImportedNumber(rawValue);
      row[field] = numeric !== "" ? numeric : String(rawValue);
    });

    row.documentId = raw[DOCUMENT_ID_HEADER] !== undefined ? String(raw[DOCUMENT_ID_HEADER]) : "";

    // Columns this app doesn't recognize (e.g. an ad hoc "Note" column IT adds) are never
    // shown on screen — but the raw values are still carried through untouched so the export
    // can round-trip them back out. IT may rely on data in these columns downstream even
    // though this screen has no use for it.
    row.passthroughFields = {};
    passthroughHeaders.forEach(header => { row.passthroughFields[header] = raw[header]; });

    // No applyItemCodeExactRule() here — real imports keep IT's own Match Type/need_review
    // determination as-is, even on rows that also have a Supplier Item Code (see the comment
    // on applyItemCodeExactRule for why forcing Exact/100 would be wrong for real data).
    return row;
  });
}

// Debug-only switches (no props panel in the standalone app; flip in code to preview these states).
const SIMULATE_ERROR = false;
const SIMULATE_EMPTY_DATA = false;
const FORCE_CONFIRM_ALL = false;

// Excel-style sortable/filterable columns (§ requirement 1) — one entry per header that gets
// a sort-arrow + filter-funnel control. `type: "number"` sorts numerically; everything else
// sorts as a locale string compare. Distinct filter values are computed from the row's own
// field of this name (see distinctValuesFor in App()).
const SORTABLE_COLUMNS = [
  { field: "invoiceNo", label: "Invoice No.", width: 120 },
  { field: "supplierNameOcr", label: "Supplier Name", width: 210 },
  { field: "ocrItemCode", label: "Supplier Item Code (OCR)", width: 130 },
  { field: "ocrDesc", label: "OCR Result (Description)", width: 260 },
  { field: "matchType", label: "Match Type", width: 90 },
  { field: "matchResult", label: "Matching Model Result", width: 260 },
  { field: "confidence", label: "% Confidence", width: 180, type: "number" },
];

function App() {
  const { useState, useEffect, useRef } = React;
  const [isLoading, setIsLoading] = useState(true);
  const [hasError, setHasError] = useState(false);
  // Generic per-column sort/filter for the Excel-like header controls (§ requirement 1) —
  // replaces the old confidence-only sortDir state entirely.
  const [columnSort, setColumnSort] = useState({ field: null, dir: null });
  const [columnFilters, setColumnFilters] = useState({});
  const [openFilterCol, setOpenFilterCol] = useState(null);
  // Draft selection while a filter popover is open (Set or null when no popover is open) —
  // checkboxes only edit this; columnFilters (the applied filter) is only written on "OK", per
  // the user's request to match Excel's own filter-popover OK/Cancel semantics rather than
  // applying every checkbox click live. Cancel / close-without-OK just discards this untouched.
  const [draftFilterValues, setDraftFilterValues] = useState(null);
  const [filterSearchQuery, setFilterSearchQuery] = useState("");
  const [openCell, setOpenCell] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [showOnlyReview, setShowOnlyReview] = useState(false);
  const [expandedRows, setExpandedRows] = useState({});
  const [rows, setRows] = useState(() => loadPersistedRows() || []);
  const [editingCell, setEditingCell] = useState(null);
  const [editValue, setEditValue] = useState("");
  const [hoveredField, setHoveredField] = useState(null);
  const [showExportConfirm, setShowExportConfirm] = useState(false);
  const [showToast, setShowToast] = useState(false);
  const [toastMessage, setToastMessage] = useState("");
  const [importError, setImportError] = useState("");
  const [supplierMaster, setSupplierMaster] = useState(FALLBACK_SUPPLIER_MASTER);
  const [supplierMasterSource, setSupplierMasterSource] = useState("built-in");
  // Picker dialog additions: keyboard highlight index, drag offset (null = default
  // centered), and session-only "recently used" lists (§ requirements 3/4/6). All reset
  // on every fresh dialog open in openCellAt() except the recent lists, which persist for
  // the whole session (in-memory only — intentionally not written to sessionStorage).
  const [highlightIndex, setHighlightIndex] = useState(0);
  const [dialogPos, setDialogPos] = useState(null);
  const [recentSuppliers, setRecentSuppliers] = useState([]);
  const [recentItems, setRecentItems] = useState([]);
  const loadTimerRef = useRef(null);
  const toastTimerRef = useRef(null);
  const importInputRef = useRef(null);
  const dragStateRef = useRef(null);
  const tableScrollRef = useRef(null);
  const optionRefs = useRef({});

  useEffect(() => {
    loadTimerRef.current = setTimeout(() => {
      setIsLoading(false);
      setHasError(SIMULATE_ERROR);
    }, 900);
    return () => {
      clearTimeout(loadTimerRef.current);
      clearTimeout(toastTimerRef.current);
    };
  }, []);

  // Try to load a live Supplier Master file sitting next to index.html on every page load. Only
  // works over http(s) (fetch() of a local file is blocked under file://) — silently keeps the
  // built-in FALLBACK_SUPPLIER_MASTER if the fetch fails for any reason (file missing, file://
  // origin, network error). Not a user-facing error: this is a best-effort freshness check.
  useEffect(() => {
    (async () => {
      try {
        const res = await fetch(SUPPLIER_MASTER_FILENAME, { cache: "no-store" });
        if (!res.ok) return;
        const buf = await res.arrayBuffer();
        const wb = XLSX.read(buf, { type: "array" });
        const sheetRows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
        const parsed = parseSupplierMasterRows(sheetRows);
        if (Object.keys(parsed).length) {
          setSupplierMaster(parsed);
          setSupplierMasterSource("file");
        }
      } catch (err) {
        // fetch blocked (file://) or file not present — keep the built-in fallback quietly
      }
    })();
  }, []);

  useEffect(() => {
    persistRows(rows);
  }, [rows]);


  function retryLoad() {
    setIsLoading(true);
    setHasError(false);
    clearTimeout(loadTimerRef.current);
    loadTimerRef.current = setTimeout(() => {
      setIsLoading(false);
      setHasError(SIMULATE_ERROR);
    }, 900);
  }

  function openCellAt(rowId, type) {
    setOpenCell({ rowId, type });
    setSearchQuery("");
    setHighlightIndex(0);
    setDialogPos(null);
  }
  function closeDropdown() { setOpenCell(null); setSearchQuery(""); }
  function pushRecent(list, entry, keyOf, max) {
    const key = keyOf(entry);
    const rest = list.filter(x => keyOf(x) !== key);
    return [entry, ...rest].slice(0, max);
  }
  function selectSupplier(rowId, supplier) {
    setRows(rs => rs.map(r => r.id === rowId ? { ...r, selectedSupplier: supplier, selectedItem: null, freeTextSupplier: false, freeTextItem: false, userTouched: true } : r));
    setRecentSuppliers(list => pushRecent(list, supplier, s => s, 3));
    setOpenCell(null); setSearchQuery("");
  }
  function selectItem(rowId, item) {
    setRows(rs => rs.map(r => r.id === rowId ? { ...r, selectedItem: item, freeTextItem: false, userTouched: true } : r));
    setRecentItems(list => pushRecent(list, item, it => it.supplierItemCode + "||" + it.supplierItemName, 3));
    setOpenCell(null); setSearchQuery("");
  }
  // Free-text entry (§ requirement 7): used when Supplier/Item Master hasn't been updated
  // yet in Oracle and the real value simply isn't in the picker list. Flags the row so it's
  // visually distinct (amber tint + "พิมพ์เอง" tag, see displayRows) and so it's included in
  // the dedicated free-text-only export. Do not infer "free text" from absence in
  // supplierMaster instead of this explicit flag — it's less robust across re-renders/export.
  function selectFreeTextSupplier(rowId, text) {
    setRows(rs => rs.map(r => r.id === rowId ? { ...r, selectedSupplier: text, selectedItem: null, freeTextSupplier: true, freeTextItem: false, userTouched: true } : r));
    setOpenCell(null); setSearchQuery("");
  }
  function selectFreeTextItem(rowId, text) {
    const item = { supplierItemCode: "", supplierItemName: text, supplierUom: "", isFreeText: true };
    setRows(rs => rs.map(r => r.id === rowId ? { ...r, selectedItem: item, freeTextItem: true, userTouched: true } : r));
    setOpenCell(null); setSearchQuery("");
  }
  function toggleExpand(rowId) {
    setExpandedRows(er => ({ ...er, [rowId]: !er[rowId] }));
  }
  function setHoverField(rowId, field) {
    setHoveredField(rowId ? { rowId, field } : null);
  }
  function startEditField(rowId, field, currentValue) {
    setEditingCell({ rowId, field }); setEditValue(currentValue);
  }
  function cancelEditField() { setEditingCell(null); setEditValue(""); }
  function commitEditField() {
    if (!editingCell) return;
    const { rowId, field } = editingCell;
    const isNumeric = field !== "poUOM" && field !== "invUOM";
    let finalValue = editValue;
    if (isNumeric) {
      const num = parseFloat(String(editValue).replace(/,/g, ""));
      finalValue = isNaN(num) ? "" : num.toLocaleString("en-US", { maximumFractionDigits: 2, minimumFractionDigits: (String(editValue).includes(".") ? 2 : 0) });
    }
    setRows(rs => rs.map(r => r.id === rowId ? { ...r, [field]: finalValue, edited: { ...(r.edited || {}), [field]: true } } : r));
    setEditingCell(null); setEditValue("");
  }
  function bulkConfirmPassed() {
    setRows(rs => rs.map(r => {
      if (!isRowPassing(r)) return r;
      const supplier = r.selectedSupplier !== undefined ? r.selectedSupplier : r.supplierNameOcr;
      const item = r.selectedItem !== undefined ? r.selectedItem : findMasterItem(supplierMaster, r.supplierNameOcr, r.matchResult, r.ocrItemCode);
      return { ...r, selectedSupplier: supplier, selectedItem: item, userTouched: true };
    }));
  }
  async function confirmExport() {
    const wrote = await writeExportFile(displayRows);
    if (!wrote) return; // user cancelled the file picker — leave state untouched
    setShowExportConfirm(false);
    fireToast("เสร็จสิ้นและส่งออกข้อมูลสำเร็จแล้ว");
    clearPersistedRows();
  }

  function fireToast(message) {
    setToastMessage(message);
    setShowToast(true);
    clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setShowToast(false), 2800);
  }

  // Shared core for both import paths (native file picker and the <input type="file">
  // fallback) — takes a File/Blob, validates, and applies it to state.
  async function importFromFile(file) {
    const hasProgress = rows.some(r => r.userTouched || r.isUserConfirmed || (r.edited && Object.keys(r.edited).length));
    if (hasProgress && !window.confirm("มีข้อมูลที่กำลังตรวจสอบอยู่ การนำเข้าไฟล์ใหม่จะแทนที่ข้อมูลเดิมทั้งหมด ต้องการดำเนินการต่อหรือไม่?")) {
      return false;
    }
    try {
      const data = new Uint8Array(await file.arrayBuffer());
      const wb = XLSX.read(data, { type: "array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const sheetRows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

      if (!sheetRows.length) {
        setImportError("ไฟล์นี้ไม่มีข้อมูล");
        return false;
      }
      const missing = findMissingImportColumns(sheetRows);
      if (missing.length) {
        setImportError(`ไฟล์นี้ไม่มีคอลัมน์ที่จำเป็น: ${missing.join(", ")}`);
        return false;
      }

      const parsed = parseImportedRows(sheetRows);
      setRows(parsed);
      setExpandedRows({});
      setShowOnlyReview(false);
      setImportError("");
      fireToast(`นำเข้าไฟล์ Excel สำเร็จแล้ว (${parsed.length} รายการ)`);
      return true;
    } catch (err) {
      setImportError("ไม่สามารถอ่านไฟล์นี้ได้ กรุณาตรวจสอบว่าเป็นไฟล์ Excel (.xlsx) ที่ถูกต้อง");
      return false;
    }
  }

  async function importViaFilePicker() {
    setImportError("");
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: "Excel file", accept: { "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": [".xlsx"] } }],
        multiple: false,
      });
      const file = await handle.getFile();
      await importFromFile(file);
    } catch (err) {
      if (err && err.name === "AbortError") return; // user cancelled the picker
      setImportError("ไม่สามารถอ่านไฟล์นี้ได้ กรุณาตรวจสอบว่าเป็นไฟล์ Excel (.xlsx) ที่ถูกต้อง");
    }
  }

  function triggerImport() {
    if (supportsFileSystemAccess()) { importViaFilePicker(); return; }
    setImportError("");
    if (importInputRef.current) importInputRef.current.click();
  }

  // Fallback for browsers without the File System Access API (Firefox/Safari) — reads the
  // file but can never get a writable handle, so Export from these browsers keeps using its
  // own existing showSaveFilePicker-or-download fallback, unaffected by this path.
  function handleImportFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    importFromFile(file);
  }

  const q = (searchQuery || "").toLowerCase();

  const confMeta = (pass) => pass
    ? { label: "ผ่าน", bg: "oklch(94% 0.035 150)", text: "oklch(35% 0.09 150)", dot: "oklch(55% 0.11 150)" }
    : { label: "ต้องตรวจ", bg: "oklch(94% 0.045 25)", text: "oklch(42% 0.14 25)", dot: "oklch(58% 0.15 25)" };

  const effectiveRows = SIMULATE_EMPTY_DATA ? [] : rows;

  const displayRows = effectiveRows.map(r => {
    const effConfidence = r.matchType === "Exact" ? 100 : r.confidence;
    const pass = isRowPassing(r);
    // Supplier auto-fill is intentionally decoupled from the Item pass/fail gate (unlike
    // Item below) — the user confirmed Supplier should auto-select whenever the OCR name
    // matches a real Supplier Master key, even on rows that still need manual Item review.
    // Do not reintroduce `(pass || FORCE_CONFIRM_ALL)` here.
    const defaultSupplier = supplierMaster[r.supplierNameOcr] ? r.supplierNameOcr : null;
    const defaultItem = (pass || FORCE_CONFIRM_ALL) ? findMasterItem(supplierMaster, r.supplierNameOcr, r.matchResult, r.ocrItemCode) : null;
    const selectedSupplier = r.selectedSupplier !== undefined ? r.selectedSupplier : defaultSupplier;
    const selectedItem = r.selectedItem !== undefined ? r.selectedItem : defaultItem;

    const cm = confMeta(pass);
    const confirmed = !!selectedItem;

    const editable = (field, label, value) => {
      const isEditing = !!editingCell && editingCell.rowId === r.id && editingCell.field === field;
      const isEdited = !!(r.edited && r.edited[field]);
      const isHovered = !!hoveredField && hoveredField.rowId === r.id && hoveredField.field === field;
      return {
        field, label, value, isEditing, notEditing: !isEditing,
        isEdited,
        showPencil: isHovered && !isEditing && !isEdited,
        underline: isEdited ? "border-bottom:1px dashed var(--color-accent-700)" : "",
        onStart: () => startEditField(r.id, field, value),
        onHoverIn: () => setHoverField(r.id, field),
        onHoverOut: () => setHoverField(null, null),
      };
    };
    const invQtyF = editable("invQty", "Invoice Qty", r.invQty);
    const invPriceF = editable("invUnitPrice", "Invoice Unit Price", r.invUnitPrice);
    const invVatF = editable("invExVat", "Invoice ex.VAT", r.invExVat);
    const invUomF = editable("invUOM", "Invoice UOM", r.invUOM);

    // PO fields (poQty/poUnitPrice/poExVat/poUOM/poNo) are still imported and exported (§5 spec)
    // but no longer rendered anywhere in the UI — the user asked for PO data to disappear from
    // the web app entirely, keeping only the Invoice side visible/editable here.
    const compareFields = [
      { label: "Qty", invField: invQtyF },
      { label: "Unit Price", invField: invPriceF },
      { label: "Amount ex.VAT", invField: invVatF },
      { label: "UOM", invField: invUomF },
    ];

    // Invoice-only fields (Discount, Freight, Deposit, Rounding, Weight, ...) — a fixed, named
    // list (§ OPTIONAL_IMPORT_COLUMNS), not a scan of unknown columns. No PO counterpart to
    // diff against, so no mismatch styling/check here, just editable like the fields above.
    const extraCompareFields = OPTIONAL_IMPORT_COLUMNS
      .filter(([, field]) => r[field] !== undefined)
      .map(([, field, label]) => ({ label, invField: editable(field, label, r[field]) }));

    const diff = diffStrings(r.ocrDesc, r.matchResult);
    const ocrDiffRuns = groupRuns(diff.aParts, "color:oklch(50% 0.18 25);text-decoration:line-through;background:oklch(94% 0.05 25)");
    const modelDiffRuns = groupRuns(diff.bParts, null, "color:oklch(35% 0.13 150);background:oklch(94% 0.05 150)");

    return {
      ...r,
      confidence: effConfidence,
      selectedSupplier: selectedSupplier || "— ยังไม่เลือก —",
      selectedItem,
      confLabel: cm.label, confBg: cm.bg, confText: cm.text, confDot: cm.dot,
      ocrHasCode: !!r.ocrItemCode, ocrMissing: !r.ocrItemCode,
      matchTypeTagClass: r.matchType === "Exact" ? "tag tag-neutral" : "tag tag-accent",
      confirmed,
      isUserConfirmed: confirmed && !!r.userTouched,
      isAutoFilled: confirmed && !r.userTouched,
      supplierCellBg: confirmed ? "oklch(94% 0.045 150)" : "transparent",
      // Free-text flag (§ requirement 7) — explicit per-row flags set by
      // selectFreeTextSupplier/selectFreeTextItem, not inferred from a supplierMaster
      // lookup miss (keeps working correctly across re-renders/export/persisted sessions).
      isFreeTextSupplier: !!r.freeTextSupplier,
      isFreeTextItem: !!r.freeTextItem || !!(selectedItem && selectedItem.isFreeText),
      // Shown on the confirm button — must read as the supplier's own item name (matches what
      // the OCR text and the picker list already show), not the internal RVN catalog name,
      // so the reviewer can visually confirm the match against the invoice at a glance.
      itemButtonLabel: selectedItem ? selectedItem.supplierItemName : "เลือก item...",
      onOpenSupplier: () => openCellAt(r.id, "supplier"),
      onOpenItem: () => openCellAt(r.id, "item"),
      compareFields, extraCompareFields,
      ocrDiffRuns, modelDiffRuns,
      isExpanded: !!expandedRows[r.id],
      chevronStyle: expandedRows[r.id] ? "transform:rotate(90deg)" : "",
      onToggleExpand: () => toggleExpand(r.id),
    };
  });

  // Column filters (§ requirement 1) — distinct-value checkboxes computed from the full
  // unfiltered displayRows (a deliberate scope cut: filters don't cascade against each
  // other's current selection, unlike real Excel — simpler and still very usable).
  function distinctValuesFor(field) {
    const set = new Set();
    displayRows.forEach(r => set.add(String(r[field] ?? "")));
    return Array.from(set).sort((a, b) => a.localeCompare(b));
  }
  // Opens field's filter popover, seeding the draft from the currently-applied filter (or "all
  // checked" if unfiltered). Closing without OK (Cancel, Escape, click-outside) just discards
  // this draft — columnFilters is only ever written by commitFilterDraft.
  function openFilterPopover(field) {
    const allValues = distinctValuesFor(field);
    const current = columnFilters[field];
    setDraftFilterValues(current ? new Set(current) : new Set(allValues));
    setFilterSearchQuery("");
    setOpenFilterCol(field);
  }
  function closeFilterPopover() {
    setOpenFilterCol(null);
    setDraftFilterValues(null);
  }
  // Commits the draft into columnFilters: "all checked" (including an empty distinct-value
  // list) is stored as no entry at all (unfiltered); anything else — including a fully empty
  // draft, i.e. every value unchecked, which legitimately means "show zero rows" — is stored
  // as an explicit Set. A field key's mere presence in columnFilters is what "filtered" means;
  // do not go back to keying that off `.size > 0`, that can't represent "show nothing".
  function commitFilterDraft(field, allValues) {
    setColumnFilters(cf => {
      const next = { ...cf };
      if (draftFilterValues && draftFilterValues.size < allValues.length) next[field] = new Set(draftFilterValues);
      else delete next[field];
      return next;
    });
    closeFilterPopover();
  }
  function toggleDraftValue(value) {
    setDraftFilterValues(draft => {
      const next = new Set(draft);
      if (next.has(value)) next.delete(value); else next.add(value);
      return next;
    });
  }
  function renderSortableTh(field, label, width) {
    const isSorted = columnSort.field === field;
    const sortIconColor = isSorted ? "var(--color-accent-700)" : "currentColor";
    const hasFilter = !!columnFilters[field];
    const isOpen = openFilterCol === field;
    const allValues = isOpen ? distinctValuesFor(field) : [];
    const q2 = filterSearchQuery.toLowerCase();
    const visibleValues = q2 ? allValues.filter(v => v.toLowerCase().includes(q2)) : allValues;
    const draft = draftFilterValues || new Set();
    // Tri-state (Select All): checked only when every distinct value is currently in the draft;
    // clicking it toggles between "everything checked" and "everything unchecked", matching the
    // real Excel behavior in the user's reference screenshot (not a one-way "reset" action).
    const allChecked = allValues.length > 0 && allValues.every(v => draft.has(v));
    return (
      <th key={field} style={{ width, position: "relative" }}>
        <span
          style={{ cursor: "pointer", userSelect: "none" }}
          onClick={() => setColumnSort(s => ({
            field,
            dir: s.field === field && s.dir === "asc" ? "desc" : (s.field === field && s.dir === "desc" ? null : "asc"),
          }))}
        >
          {label}{" "}
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={sortIconColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ verticalAlign: "-1px" }}><path d="m21 16-4 4-4-4"></path><path d="M17 20V4"></path><path d="m3 8 4-4 4 4"></path><path d="M7 4v16"></path></svg>
        </span>
        <button
          title="กรอง"
          onClick={e => { e.stopPropagation(); if (isOpen) closeFilterPopover(); else openFilterPopover(field); }}
          style={{ border: "none", background: "none", cursor: "pointer", padding: "0 0 0 5px", verticalAlign: "-2px", color: hasFilter ? "var(--color-accent-700)" : "color-mix(in srgb, var(--color-text) 45%, transparent)" }}
        >
          <svg width="12" height="12" viewBox="0 0 24 24" fill={hasFilter ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 4 21 4 14 12 14 19 10 21 10 12 3 4"></polygon></svg>
        </button>
        {isOpen && (
          <div
            className="dialog"
            // Every sub-section below has a literal fixed pixel height (search 28, select-all
            // 24, list exactly 180, actions 26) instead of relying on flexbox to distribute
            // space — the previous flex:"1 1 auto"/minHeight:0 approach still let the box's
            // rendered size vary with content in some layouts (real bug report + screenshot
            // from the user: at a narrow browser window the box still visibly grew/shrank with
            // content instead of staying fixed). `display:"block"` overrides the `.dialog`
            // class's `display:flex` for this specific popover so none of this is flex-computed
            // at all. Total content height (28+24+180+26 + 3×6 gaps via margin = 276) plus
            // 20px padding (10 top+bottom) = 296, comfortably under the outer `height:320` —
            // if any of these fixed numbers change, keep the sum under 320 or raise it to match.
            style={{ position: "absolute", top: "100%", left: 0, zIndex: 45, width: 230, height: 320, overflow: "hidden", padding: 10, marginTop: 4, display: "block", fontWeight: 400, textTransform: "none", letterSpacing: "normal" }}
            onClick={e => e.stopPropagation()}
          >
            <input className="input" style={{ fontSize: 12, padding: "4px 8px", height: 28, boxSizing: "border-box" }} placeholder="ค้นหาค่า..." value={filterSearchQuery} onChange={e => setFilterSearchQuery(e.target.value)} onKeyDown={e => { if (e.key === "Escape") closeFilterPopover(); }} autoFocus />
            <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, height: 24, marginTop: 6, padding: "2px", borderBottom: "1px solid var(--color-divider)", cursor: "pointer", boxSizing: "border-box" }}>
              <input
                type="checkbox"
                checked={allChecked}
                onChange={() => setDraftFilterValues(allChecked ? new Set() : new Set(allValues))}
              />
              (เลือกทั้งหมด)
            </label>
            <div style={{ overflowY: "auto", overflowX: "hidden", height: 180, marginTop: 6 }}>
              {visibleValues.map(v => (
                <label key={v || "(blank)"} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, padding: "3px 2px", cursor: "pointer" }}>
                  <input type="checkbox" checked={draft.has(v)} onChange={() => toggleDraftValue(v)} />
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{v || "(ว่าง)"}</span>
                </label>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 6, height: 26, marginTop: 6 }}>
              <button className="btn btn-secondary" style={{ fontSize: 11, padding: "3px 10px" }} onClick={closeFilterPopover}>Cancel</button>
              <button className="btn btn-primary" style={{ fontSize: 11, padding: "3px 10px" }} onClick={() => commitFilterDraft(field, allValues)}>OK</button>
            </div>
          </div>
        )}
      </th>
    );
  }
  let sortedRows = displayRows;
  Object.keys(columnFilters).forEach(field => {
    // A field's mere presence in columnFilters means "filtered" — including an explicit empty
    // Set, which legitimately means "show zero rows" (every checkbox unchecked + OK). Do not
    // add back a `.size > 0` guard here, see commitFilterDraft's comment.
    const allowed = columnFilters[field];
    sortedRows = sortedRows.filter(r => allowed.has(String(r[field] ?? "")));
  });
  if (showOnlyReview) sortedRows = sortedRows.filter(r => r.confLabel === "ต้องตรวจ");
  if (columnSort.field) {
    const field = columnSort.field;
    const dir = columnSort.dir;
    const col = SORTABLE_COLUMNS.find(c => c.field === field);
    const isNumeric = col && col.type === "number";
    sortedRows = [...sortedRows].sort((a, b) => {
      if (isNumeric) {
        const av = Number(a[field]) || 0, bv = Number(b[field]) || 0;
        return dir === "asc" ? av - bv : bv - av;
      }
      const av = String(a[field] ?? ""), bv = String(b[field] ?? "");
      return dir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  const stats = {
    total: effectiveRows.length,
    exact: effectiveRows.filter(r => r.matchType === "Exact").length,
    fuzzy: effectiveRows.filter(r => r.matchType === "Fuzzy").length,
    pass: displayRows.filter(r => r.confLabel === "ผ่าน").length,
    needsReview: displayRows.filter(r => r.confLabel === "ต้องตรวจ").length,
    missingOcr: effectiveRows.filter(r => !r.ocrItemCode).length,
    confirmed: displayRows.filter(r => r.confirmed).length,
  };
  stats.pending = stats.total - stats.confirmed;
  const unconfirmedReview = displayRows.filter(r => r.confLabel === "ต้องตรวจ" && !r.confirmed).length;
  // Export is no longer gated on every row being confirmed (reversed decision — see
  // CLAUDE.md) — unconfirmedReview now only drives a non-blocking warning in the confirm
  // dialog, not a hard block.
  const exportDisabled = stats.total === 0;
  const bulkDisabled = stats.pass === 0;
  const freeTextRows = displayRows.filter(r => r.isFreeTextSupplier || r.isFreeTextItem);
  const freeTextExportDisabled = freeTextRows.length === 0;
  function exportFreeTextRows() {
    const wb = buildFreeTextExportWorkbook(freeTextRows);
    const dateStr = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `Item_Mapping_FreeText_${dateStr}.xlsx`);
  }

  let dialogOptions = [];
  let dialogTitle = "";
  let dialogCurrentLabel = "";
  let dialogFreeTextOption = null;
  if (openCell) {
    const activeRow = displayRows.find(r => r.id === openCell.rowId);
    if (openCell.type === "supplier") {
      dialogTitle = "เลือก Supplier";
      dialogCurrentLabel = activeRow && activeRow.selectedSupplier ? activeRow.selectedSupplier : "";
      const recentOptions = !q
        ? recentSuppliers
            .filter(name => !!supplierMaster[name])
            .map(name => ({ key: "recent-" + name, label: name, sub: "", isRecent: true, selected: name === dialogCurrentLabel, onSelect: () => selectSupplier(openCell.rowId, name) }))
        : [];
      const mainOptions = Object.keys(supplierMaster)
        .filter(name => !q || name.toLowerCase().includes(q))
        .map(name => ({ key: name, label: name, sub: "", selected: name === dialogCurrentLabel, onSelect: () => selectSupplier(openCell.rowId, name) }));
      dialogOptions = recentOptions.concat(mainOptions);
      if (q.trim() && !mainOptions.some(o => o.label.toLowerCase() === q)) {
        dialogFreeTextOption = { key: "freetext", label: `ใช้ "${searchQuery.trim()}" (พิมพ์เอง)`, isFreeText: true, onSelect: () => selectFreeTextSupplier(openCell.rowId, searchQuery.trim()) };
      }
    } else if (activeRow) {
      dialogTitle = "เลือก Item";
      dialogCurrentLabel = activeRow.selectedItem ? activeRow.selectedItem.supplierItemName : "";
      const pool = supplierMaster[activeRow.selectedSupplier] || [];
      const poolKey = it => (it.supplierItemCode || "") + "||" + it.supplierItemName;
      const poolKeys = new Set(pool.map(poolKey));
      const recentOptions = !q
        ? recentItems
            .filter(it => poolKeys.has(poolKey(it)))
            .map((it, idx) => ({ key: "recent-" + poolKey(it), label: it.supplierItemName, sub: "", isRecent: true, selected: !!activeRow.selectedItem && it.supplierItemName === activeRow.selectedItem.supplierItemName && it.supplierItemCode === activeRow.selectedItem.supplierItemCode, onSelect: () => selectItem(openCell.rowId, it) }))
        : [];
      const mainOptions = pool
        .filter(it => !q || (it.supplierItemCode + it.supplierItemName).toLowerCase().includes(q))
        .map((it, idx) => ({
          key: (it.supplierItemCode || "noCode") + "-" + idx,
          label: it.supplierItemName,
          sub: "",
          selected: !!activeRow.selectedItem && it.supplierItemName === activeRow.selectedItem.supplierItemName && it.supplierItemCode === activeRow.selectedItem.supplierItemCode,
          onSelect: () => selectItem(openCell.rowId, it),
        }));
      dialogOptions = recentOptions.concat(mainOptions);
      if (q.trim() && !mainOptions.some(o => o.label.toLowerCase() === q)) {
        dialogFreeTextOption = { key: "freetext", label: `ใช้ "${searchQuery.trim()}" (พิมพ์เอง)`, isFreeText: true, onSelect: () => selectFreeTextItem(openCell.rowId, searchQuery.trim()) };
      }
    }
  }
  // A separate always-visible "add new" footer button was tried here and removed (§ fix,
  // 2nd round) — with search text entered it duplicated this same in-list free-text option
  // (two buttons doing the same thing, confirmed redundant by the user), and with no search
  // text it did nothing useful. The in-list option below is now the one and only "add your
  // own" affordance — kept discoverable by giving it a solid, distinctly-colored "proper box"
  // treatment (not just a dashed border blending into the regular option rows) once the user
  // types something with no match, rather than being always-visible.
  // Keyboard nav (§ requirement 3) walks this combined, flat, selectable list — free-text
  // (when present) is always the last stop so Enter on it creates the free-text entry.
  const dialogAllOptions = dialogFreeTextOption ? dialogOptions.concat([dialogFreeTextOption]) : dialogOptions;

  const isError = !isLoading && hasError;
  const isEmpty = !isLoading && !hasError && stats.total === 0;
  const showTable = !isLoading && !hasError && stats.total > 0;
  const filterBtnClass = showOnlyReview ? "btn-primary" : "btn-secondary";
  const exportTooltip = exportDisabled ? "ไม่มีข้อมูลให้ส่งออก" : "";
  const bulkTooltip = bulkDisabled ? "ไม่มีแถวที่ผ่านเกณฑ์ให้ยืนยัน" : "";

  return (
    <div style={{ minHeight: "100vh", background: "var(--color-bg)", color: "var(--color-text)", fontFamily: "var(--font-body)" }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 24, padding: "28px 40px", borderBottom: "1px solid var(--color-divider)" }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--color-accent-700)", fontFamily: "var(--font-body)" }}>PO–Invoice–DO Mapping · RVN 1020</div>
          <h1 style={{ marginTop: 4, fontFamily: "var(--font-body)" }}>Invoice data Validation</h1>
          <div style={{ fontSize: 12, marginTop: 4, color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>
            Supplier Master:{" "}
            {supplierMasterSource === "file" && "โหลดจากไฟล์ล่าสุดในโฟลเดอร์"}
            {supplierMasterSource === "built-in" && "ข้อมูลเริ่มต้นในแอป (อาจไม่ใช่ข้อมูลล่าสุด)"}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: "none" }}>
          <input ref={importInputRef} type="file" accept=".xlsx,.xls" style={{ display: "none" }} onChange={handleImportFile} />
          <button className="btn btn-secondary" style={{ flex: "none", whiteSpace: "nowrap" }} onClick={triggerImport}>
            นำเข้าไฟล์ Excel
          </button>
          <span title={exportTooltip}>
            <button className="btn btn-primary" style={{ flex: "none", whiteSpace: "nowrap", opacity: exportDisabled ? 0.45 : 1 }} disabled={exportDisabled} onClick={() => { if (!exportDisabled) setShowExportConfirm(true); }}>
              เสร็จสิ้นและส่งออกข้อมูล
            </button>
          </span>
          <span title={freeTextExportDisabled ? "ไม่มีแถวที่พิมพ์เอง" : ""}>
            <button
              className="btn btn-secondary"
              style={{ flex: "none", whiteSpace: "nowrap", opacity: freeTextExportDisabled ? 0.45 : 1, border: "1px dashed var(--color-accent-700)", color: "var(--color-accent-700)" }}
              disabled={freeTextExportDisabled}
              onClick={() => { if (!freeTextExportDisabled) exportFreeTextRows(); }}
            >
              ส่งออกเฉพาะรายการที่พิมพ์เอง ({freeTextRows.length})
            </button>
          </span>
        </div>
      </div>

      {importError && (
        <div style={{ margin: "16px 40px 0", padding: "10px 14px", borderRadius: "var(--radius-md)", border: "1px solid oklch(58% 0.15 25)", background: "color-mix(in srgb, oklch(58% 0.15 25) 10%, transparent)", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <span>{importError}</span>
          <button className="btn btn-ghost" style={{ fontSize: 12, padding: "2px 8px" }} onClick={() => setImportError("")}>ปิด</button>
        </div>
      )}

      {isLoading && (
        <div style={{ padding: "24px 40px 56px" }}>
          <div style={{ display: "flex", gap: 16, marginBottom: 18 }}>
            <div className="imv-skel" style={{ width: 160, height: 16 }}></div>
            <div className="imv-skel" style={{ width: 160, height: 16 }}></div>
            <div className="imv-skel" style={{ width: 160, height: 16 }}></div>
          </div>
          <div style={{ border: "1px solid var(--color-divider)", borderRadius: "var(--radius-md)", padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
            {[1, 2, 3, 4, 5, 6].map(sk => (
              <div key={sk} className="imv-skel" style={{ width: "100%", height: 36 }}></div>
            ))}
          </div>
        </div>
      )}

      {isError && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, padding: "100px 24px", textAlign: "center" }}>
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="oklch(45% 0.14 25)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          <div style={{ fontSize: 16 }}>ไม่สามารถโหลดข้อมูลได้ กรุณาลองใหม่อีกครั้ง</div>
          <button className="btn btn-secondary" onClick={retryLoad}>ลองใหม่</button>
        </div>
      )}

      {isEmpty && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, padding: "100px 24px", textAlign: "center", color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11H3v10h18V11h-6"></path><path d="M12 3v13"></path><path d="m8 8 4-5 4 5"></path></svg>
          <div style={{ fontSize: 15 }}>ไม่มีรายการที่ต้องตรวจสอบในขณะนี้</div>
        </div>
      )}

      {showTable && (
        <div style={{ padding: "24px 40px 56px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 24, flexWrap: "wrap", marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid var(--color-divider)" }}>
            <div style={{ fontSize: 13 }}><span style={{ color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>ทั้งหมด :</span> <strong style={{ fontFamily: "var(--font-body)", fontSize: 13, fontWeight: 600 }}>{stats.total}</strong></div>
            <div style={{ fontSize: 13 }}><span style={{ color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>ยืนยันแล้ว :</span> <strong style={{ fontFamily: "var(--font-body)", fontSize: 13, color: "var(--color-neutral-900)", fontWeight: 600 }}>{stats.confirmed}</strong></div>
            <div style={{ fontSize: 13 }}><span style={{ color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>Exact / Fuzzy :</span> <strong style={{ fontFamily: "var(--font-body)", fontSize: 13, fontWeight: 600 }}>{stats.exact} / {stats.fuzzy}</strong></div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14, flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: "color-mix(in srgb, var(--color-text) 60%, transparent)" }}>
              <span style={{ width: 9, height: 9, borderRadius: "50%", background: "oklch(55% 0.11 150)" }}></span>ผ่าน
              <span style={{ width: 9, height: 9, borderRadius: "50%", background: "oklch(58% 0.15 25)", marginLeft: 10 }}></span>ต้องตรวจ/แก้ไข
            </div>
            <button className={`btn ${filterBtnClass}`} style={{ fontSize: 12, padding: "6px 12px" }} onClick={() => setShowOnlyReview(v => !v)}>แสดงเฉพาะที่ต้องตรวจ</button>
            <span title={bulkTooltip}>
              <button className="btn btn-primary" style={{ fontSize: 12, padding: "6px 12px", whiteSpace: "nowrap", opacity: bulkDisabled ? 0.45 : 1 }} disabled={bulkDisabled} onClick={() => { if (!bulkDisabled) bulkConfirmPassed(); }}>ยืนยันทั้งหมดที่ผ่านเกณฑ์ ({stats.pass})</button>
            </span>
            <div style={{ marginLeft: "auto", fontSize: 13, color: "color-mix(in srgb, var(--color-text) 60%, transparent)" }}>ยืนยันแล้ว {stats.confirmed} / {stats.total}</div>
          </div>

          <div
            ref={tableScrollRef}
            style={{ overflowX: "auto", overflowY: "visible", border: "1px solid var(--color-divider)", borderRadius: "var(--radius-md)", position: "relative", background: "var(--color-bg)" }}
          >
            <table className="table" style={{ minWidth: 1790, tableLayout: "fixed", borderCollapse: "separate", borderSpacing: 0 }}>
              <thead>
                <tr>
                  <th style={{ width: 40 }}></th>
                  {SORTABLE_COLUMNS.map(c => renderSortableTh(c.field, c.label, c.width))}
                  <th style={{ width: 220 }}>เลือก Supplier</th>
                  <th style={{ width: 280 }}>เลือก Item</th>
                </tr>
              </thead>
              <tbody>
                {sortedRows.map(row => (
                  <React.Fragment key={row.id}>
                    <tr>
                      <td>
                        <button onClick={row.onToggleExpand} style={{ border: "none", background: "none", cursor: "pointer", padding: 4, display: "flex", color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={styleObj(row.chevronStyle)}><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                      </td>
                      <td>{row.invoiceNo}</td>
                      <td style={{ background: row.supplierCellBg }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          {row.isUserConfirmed && (
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="oklch(38% 0.1 150)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flex: "none" }}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 17.01"></polyline></svg>
                          )}
                          {row.isAutoFilled && (
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="color-mix(in srgb, var(--color-text) 40%, transparent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flex: "none" }}><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 3"></path></svg>
                          )}
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={row.supplierNameOcr}>{row.supplierNameOcr}</span>
                        </div>
                        {row.isUserConfirmed && <div style={{ fontSize: 10, color: "oklch(38% 0.1 150)", marginTop: 4 }}>ยืนยันแล้ว</div>}
                        {row.isAutoFilled && <div style={{ fontSize: 10, color: "color-mix(in srgb, var(--color-text) 45%, transparent)", marginTop: 4 }}>ระบบเลือกให้</div>}
                      </td>
                      <td>
                        {row.ocrMissing && (
                          <span style={{ display: "inline-flex", alignItems: "center", gap: 5, color: "oklch(45% 0.14 25)", fontSize: 12 }}>
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                            ไม่พบข้อมูล
                          </span>
                        )}
                        {row.ocrHasCode && <span>{row.ocrItemCode}</span>}
                      </td>
                      <td style={{ whiteSpace: "normal", wordBreak: "break-word" }}>{row.ocrDiffRuns.map((run, i) => <span key={i} style={styleObj(run.style)}>{run.text}</span>)}</td>
                      <td><span className={row.matchTypeTagClass} style={{ display: "inline-flex", padding: "3px 10px", borderRadius: 3, fontSize: 11 }}>{row.matchType}</span></td>
                      <td style={{ whiteSpace: "normal", wordBreak: "break-word" }}>{row.modelDiffRuns.map((run, i) => <span key={i} style={styleObj(run.style)}>{run.text}</span>)}</td>
                      <td>
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 6, background: row.confBg, color: row.confText, padding: "4px 10px", borderRadius: 12, fontSize: 12, fontVariantNumeric: "tabular-nums" }}>
                          <span style={{ width: 7, height: 7, borderRadius: "50%", background: row.confDot }}></span>
                          {row.confidence}% · {row.confLabel}
                        </span>
                      </td>
                      <td style={{ background: row.isFreeTextSupplier ? "var(--color-accent-100)" : undefined }}>
                        <button className="btn btn-secondary" style={{ width: "100%", justifyContent: "space-between", fontFamily: "var(--font-body)", fontWeight: 400, fontSize: 13, border: row.isFreeTextSupplier ? "1px dashed var(--color-accent-700)" : undefined }} onClick={row.onOpenSupplier}>
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.selectedSupplier}</span>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flex: "none" }}><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        {row.isFreeTextSupplier && <div style={{ fontSize: 10, color: "var(--color-accent-700)", marginTop: 4 }}>✎ พิมพ์เอง (ไม่มีในระบบ)</div>}
                      </td>
                      <td style={{ background: row.isFreeTextItem ? "var(--color-accent-100)" : undefined }}>
                        <button className="btn btn-secondary" style={{ width: "100%", justifyContent: "space-between", fontFamily: "var(--font-body)", fontWeight: 400, fontSize: 13, border: row.isFreeTextItem ? "1px dashed var(--color-accent-700)" : undefined }} onClick={row.onOpenItem}>
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.itemButtonLabel}</span>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flex: "none" }}><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        {row.isFreeTextItem && <div style={{ fontSize: 10, color: "var(--color-accent-700)", marginTop: 4 }}>✎ พิมพ์เอง (ไม่มีในระบบ)</div>}
                      </td>
                    </tr>
                    {row.isExpanded && (
                      <tr>
                        <td colSpan={10} style={{ background: "color-mix(in srgb, var(--color-text) 4%, var(--color-bg))", borderTop: "1px dashed var(--color-divider)", borderBottom: "1px solid var(--color-divider)", padding: "18px 24px", position: "relative", zIndex: 0 }}>
                          <div style={{ fontSize: 11, letterSpacing: "0.06em", textTransform: "uppercase", color: "color-mix(in srgb, var(--color-text) 55%, transparent)", marginBottom: 10 }}>Invoice Reference</div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
                            {row.compareFields.map((cf, i) => (
                              <div key={i} style={{ border: "1px solid var(--color-divider)", borderRadius: "var(--radius-md)", padding: "10px 12px", background: "var(--color-bg)", position: "relative", zIndex: 1 }}>
                                <div style={{ fontSize: 11, color: "color-mix(in srgb, var(--color-text) 55%, transparent)", marginBottom: 6 }}>{cf.label}</div>
                                <div style={{ fontSize: 13, fontVariantNumeric: "tabular-nums", display: "flex", alignItems: "center", gap: 5, minHeight: 20 }}>
                                  {cf.invField.isEditing ? (
                                    <input className="input" style={{ padding: "2px 6px", minHeight: "auto", fontSize: 13, width: 100, background: "var(--color-bg)" }} value={editValue} onChange={e => setEditValue(e.target.value)} onKeyDown={e => { if (e.key === "Enter") commitEditField(); if (e.key === "Escape") cancelEditField(); }} onBlur={commitEditField} autoFocus />
                                  ) : (
                                    <span style={{ cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4, ...styleObj(cf.invField.underline) }} onClick={cf.invField.onStart} onMouseEnter={cf.invField.onHoverIn} onMouseLeave={cf.invField.onHoverOut}>
                                      <span style={!cf.invField.value ? { fontStyle: "italic", color: "color-mix(in srgb, var(--color-text) 45%, transparent)" } : undefined}>{cf.invField.value || "ไม่ทราบค่า"}</span>
                                      {cf.invField.isEdited && (
                                        <span style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--color-accent-700)", flex: "none" }}></span>
                                      )}
                                      {cf.invField.showPencil && (
                                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="color-mix(in srgb, var(--color-text) 45%, transparent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path></svg>
                                      )}
                                    </span>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>

                          {row.extraCompareFields.length > 0 && (
                            <React.Fragment>
                              <div style={{ fontSize: 11, letterSpacing: "0.06em", textTransform: "uppercase", color: "color-mix(in srgb, var(--color-text) 55%, transparent)", margin: "14px 0 10px" }}>ข้อมูลเพิ่มเติมจาก Invoice</div>
                              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
                                {row.extraCompareFields.map((ef, i) => (
                                  <div key={i} style={{ border: "1px solid var(--color-divider)", borderRadius: "var(--radius-md)", padding: "10px 12px", background: "var(--color-bg)", position: "relative", zIndex: 1 }}>
                                    <div style={{ fontSize: 11, color: "color-mix(in srgb, var(--color-text) 55%, transparent)", marginBottom: 6 }}>{ef.label}</div>
                                    <div style={{ fontSize: 13, fontVariantNumeric: "tabular-nums", display: "flex", alignItems: "center", gap: 5, minHeight: 20 }}>
                                      {ef.invField.isEditing ? (
                                        <input className="input" style={{ padding: "2px 6px", minHeight: "auto", fontSize: 13, width: 100, background: "var(--color-bg)" }} value={editValue} onChange={e => setEditValue(e.target.value)} onKeyDown={e => { if (e.key === "Enter") commitEditField(); if (e.key === "Escape") cancelEditField(); }} onBlur={commitEditField} autoFocus />
                                      ) : (
                                        <span style={{ cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4, ...styleObj(ef.invField.underline) }} onClick={ef.invField.onStart} onMouseEnter={ef.invField.onHoverIn} onMouseLeave={ef.invField.onHoverOut}>
                                          <span>{ef.invField.value}</span>
                                          {ef.invField.isEdited && (
                                            <span style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--color-accent-700)", flex: "none" }}></span>
                                          )}
                                          {ef.invField.showPencil && (
                                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="color-mix(in srgb, var(--color-text) 45%, transparent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path></svg>
                                          )}
                                        </span>
                                      )}
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </React.Fragment>
                          )}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {!!openFilterCol && (
        <div style={{ position: "fixed", inset: 0, zIndex: 44 }} onClick={closeFilterPopover}></div>
      )}

      {!!openCell && (
        <div className="dialog-backdrop" onClick={closeDropdown} style={{ zIndex: 50 }}>
          <div
            className="dialog"
            onClick={e => e.stopPropagation()}
            style={{ maxHeight: "70vh", transform: dialogPos ? `translate(${dialogPos.x}px, ${dialogPos.y}px)` : undefined }}
          >
            <div
              className="dialog-title"
              style={{ cursor: "grab", userSelect: "none" }}
              onMouseDown={e => {
                e.preventDefault();
                const start = { x: e.clientX, y: e.clientY, base: dialogPos || { x: 0, y: 0 } };
                dragStateRef.current = start;
                const onMove = ev => {
                  setDialogPos({ x: start.base.x + (ev.clientX - start.x), y: start.base.y + (ev.clientY - start.y) });
                };
                const onUp = () => {
                  document.removeEventListener("mousemove", onMove);
                  document.removeEventListener("mouseup", onUp);
                };
                document.addEventListener("mousemove", onMove);
                document.addEventListener("mouseup", onUp);
              }}
            >
              {dialogTitle}
            </div>
            {dialogCurrentLabel && (
              <div style={{ fontSize: 13, padding: "6px 10px", background: "color-mix(in srgb, var(--color-accent-700) 10%, transparent)", borderRadius: "var(--radius-md)" }}>
                <span style={{ color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>ตอนนี้เลือก :</span> <strong>{dialogCurrentLabel}</strong>
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", border: "1px solid var(--color-divider)", borderRadius: "var(--radius-md)" }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.6, flex: "none" }}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input
                className="input"
                style={{ border: "none", padding: 0, minHeight: "auto" }}
                placeholder="พิมพ์เพื่อค้นหา..."
                value={searchQuery}
                onChange={e => { setSearchQuery(e.target.value); setHighlightIndex(0); }}
                onKeyDown={e => {
                  if (e.key === "ArrowDown") {
                    e.preventDefault();
                    setHighlightIndex(i => {
                      const next = Math.min(i + 1, dialogAllOptions.length - 1);
                      const el = optionRefs.current[dialogAllOptions[next] && dialogAllOptions[next].key];
                      if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
                      return next;
                    });
                  } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    setHighlightIndex(i => {
                      const next = Math.max(i - 1, 0);
                      const el = optionRefs.current[dialogAllOptions[next] && dialogAllOptions[next].key];
                      if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
                      return next;
                    });
                  } else if (e.key === "Enter") {
                    e.preventDefault();
                    const opt = dialogAllOptions[highlightIndex];
                    if (opt) opt.onSelect();
                  } else if (e.key === "Escape") {
                    closeDropdown();
                  }
                }}
                autoFocus
              />
            </div>
            <div style={{ overflow: "auto", maxHeight: 320, display: "flex", flexDirection: "column", gap: 2 }}>
              {dialogAllOptions.length === 0 && (
                <div style={{ padding: "14px 8px", fontSize: 13, color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>ไม่พบรายการที่ตรงกัน</div>
              )}
              {dialogAllOptions.map((opt, idx) => (
                <React.Fragment key={opt.key}>
                  {idx === 0 && opt.isRecent && (
                    <div style={{ fontSize: 11, letterSpacing: "0.06em", textTransform: "uppercase", color: "color-mix(in srgb, var(--color-text) 55%, transparent)", padding: "2px 8px" }}>ล่าสุด</div>
                  )}
                  {idx > 0 && dialogAllOptions[idx - 1].isRecent && !opt.isRecent && (
                    <div style={{ fontSize: 11, letterSpacing: "0.06em", textTransform: "uppercase", color: "color-mix(in srgb, var(--color-text) 55%, transparent)", padding: "6px 8px 2px", borderTop: "1px solid var(--color-divider)", marginTop: 2 }}>ทั้งหมด</div>
                  )}
                  {/* Free-text "add your own" option (§ fix, 2nd round) — the one and only
                      add-new affordance now (a separate always-visible footer button was tried
                      and removed as redundant with this). Given a solid, distinctly-colored
                      "proper box" treatment per the user's explicit ask — not just a dashed
                      border blending into the regular option rows above it. */}
                  {opt.isFreeText && (
                    <div style={{ borderTop: "1px solid var(--color-divider)", margin: "4px 0" }}></div>
                  )}
                  <div
                    ref={el => { if (el) optionRefs.current[opt.key] = el; }}
                    className="dialog-option"
                    style={opt.isFreeText ? {
                      padding: "12px 10px", fontSize: 14, fontWeight: 600, borderRadius: "var(--radius-sm)", cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
                      border: "1px solid var(--color-accent-700)",
                      background: idx === highlightIndex
                        ? "color-mix(in srgb, var(--color-accent-700) 28%, transparent)"
                        : "var(--color-accent-100)",
                      color: "var(--color-accent-800)",
                    } : {
                      padding: 10, fontSize: 14, borderRadius: "var(--radius-sm)", cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
                      border: "1px solid transparent",
                      background: idx === highlightIndex
                        ? "color-mix(in srgb, var(--color-accent-700) 16%, transparent)"
                        : (opt.selected ? "color-mix(in srgb, var(--color-accent-700) 10%, transparent)" : undefined),
                    }}
                    onClick={opt.onSelect}
                    onMouseEnter={() => setHighlightIndex(idx)}
                  >
                    <div>
                      <div>{opt.isFreeText ? `➕ ${opt.label}` : opt.label}</div>
                      {opt.sub && <div style={{ fontSize: 11, color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>{opt.sub}</div>}
                    </div>
                    {opt.selected && (
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flex: "none", color: "var(--color-accent-700)" }}><polyline points="20 6 9 17 4 12"></polyline></svg>
                    )}
                  </div>
                </React.Fragment>
              ))}
            </div>
            <div className="dialog-actions">
              <button className="btn btn-secondary" onClick={closeDropdown}>ปิด</button>
            </div>
          </div>
        </div>
      )}

      {showExportConfirm && (
        <div className="dialog-backdrop" onClick={() => setShowExportConfirm(false)} style={{ zIndex: 60 }}>
          <div className="dialog" onClick={e => e.stopPropagation()}>
            <div className="dialog-title">ยืนยันเสร็จสิ้นและส่งออกข้อมูล</div>
            <p style={{ fontSize: 14, margin: 0 }}>ยืนยันเสร็จสิ้นและส่งออกข้อมูล {stats.total} รายการเป็นไฟล์ Excel?</p>
            {unconfirmedReview > 0 && (
              <p style={{ fontSize: 13, margin: 0, color: "oklch(42% 0.14 25)", background: "oklch(94% 0.045 25)", padding: "8px 10px", borderRadius: "var(--radius-md)" }}>
                ยังมี {unconfirmedReview} แถวที่ยังไม่ได้ตรวจ ต้องการส่งออกต่อหรือไม่?
              </p>
            )}
            {!supportsFileSystemAccess() && (
              <p style={{ fontSize: 12, margin: 0, color: "color-mix(in srgb, var(--color-text) 55%, transparent)" }}>เบราว์เซอร์นี้จะดาวน์โหลดเป็นไฟล์ใหม่ทุกครั้ง</p>
            )}
            <div className="dialog-actions">
              <button className="btn btn-secondary" onClick={() => setShowExportConfirm(false)}>ยกเลิก</button>
              <button className="btn btn-primary" onClick={confirmExport}>ยืนยันและส่งออก</button>
            </div>
          </div>
        </div>
      )}

      {showToast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "oklch(25% 0.02 100)", color: "white", padding: "12px 20px", borderRadius: "var(--radius-md)", fontSize: 13, boxShadow: "var(--shadow-lg)", zIndex: 80, display: "flex", alignItems: "center", gap: 8 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="oklch(70% 0.15 150)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 17.01"></polyline></svg>
          {toastMessage}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
