// Live Supplier Master file: fetched from this filename, in the same folder as index.html, on
// every app load (see App()'s useEffect below). Whenever IT/procurement updates the real
// "Supplier item master" spreadsheet, save the new copy over this exact filename — no code
// change needed, just reload the page. Only works when served over http(s) (Codespace, GitHub
// Pages, Cloudflare Pages, etc.) — browsers block fetch() of local files on a plain file://
// open; in that case the app silently falls back to FALLBACK_SUPPLIER_MASTER below (a manual
// "Import Supplier Master" button was considered as a file:// fallback but explicitly rejected —
// don't re-add it).
const SUPPLIER_MASTER_FILENAME = "supplier_item_master.xlsx";

// Parses a raw Supplier Master worksheet (SheetJS sheet_to_json rows) into the same
// { [supplierName]: [{supplierItemCode, supplierItemName, supplierUom}, ...] } shape as
// FALLBACK_SUPPLIER_MASTER. Preferred headers ("Supplier Name" / "Supplier Item Code" /
// "Supplier Item Name" / "Supplier Item UOM") are the clean 4-column spec agreed with the user
// to hand to IT — flat columns, header row 1, no Oracle DFF pipe-delimited fields, no RVN/FG
// Item codes (deliberately excluded, §3). Each field also falls back to the OLD source file's
// header text ("Oracle Supplier Name" / "supplier item code" / "supplier item name" / "supplier
// item UOM (INV)") so an old-format file (originally copied from "Supplier item master update
// 1.xlsx") would keep working — moot now that the real IT file is deployed (§4), but harmless to
// keep as a safety net. Filename is `SUPPLIER_MASTER_FILENAME` above — currently
// `"supplier_item_master.xlsx"`, matching what IT actually calls their export; once that
// happens the old fallback names can be deleted, but don't remove them pre-emptively. Note: the
// supplier's full Thai company name must match the Invoice file's own "Supplier Name" column
// exactly — a past bug used the OLD file's plain "supplier name" column, which is actually just
// a short internal mnemonic code ("JWT"/"KTMT"), not the real name; don't reintroduce that key.
// Header lookups are whitespace-tolerant: IT's real first delivery of this file has a literal
// trailing space in its "Supplier Item Code " header (confirmed by inspecting the actual file —
// it's generated from an Oracle SQL query with `... as "Supplier Item Code "`, space included in
// the query itself). An exact-string lookup would silently return "" for every row's item code
// forever. `trimmedKeys()` normalizes every column name on a row before any field lookup runs,
// so this — and any similar accidental whitespace in a future delivery — doesn't silently break.
function trimmedKeys(raw) {
  const out = {};
  Object.keys(raw).forEach(k => { out[k.trim()] = raw[k]; });
  return out;
}

function parseSupplierMasterRows(sheetRows) {
  const master = {};
  sheetRows.forEach(rawUntrimmed => {
    const raw = trimmedKeys(rawUntrimmed);
    const supplierName = String(raw["Supplier Name"] ?? raw["Oracle Supplier Name"] ?? "").trim();
    if (!supplierName) return;
    const item = {
      supplierItemCode: String(raw["Supplier Item Code"] ?? raw["supplier item code"] ?? "").trim(),
      supplierItemName: String(raw["Supplier Item Name"] ?? raw["supplier item name"] ?? "").trim(),
      supplierUom: String(raw["Supplier Item UOM"] ?? raw["supplier item UOM (INV)"] ?? "").trim(),
    };
    if (!item.supplierItemName) return;
    if (!master[supplierName]) master[supplierName] = [];
    master[supplierName].push(item);
  });
  return master;
}

// Business rule for the built-in MOCK dataset only (RAW_ROWS below): a Supplier Item Code
// (OCR) is treated as a reliable identifier — if OCR captured one, the row is always an Exact
// match at 100% confidence. NOT applied to real imported files anymore — IT's real pipeline
// (§ need_review) already makes its own Match Type/review determination per row, including
// cases where a Supplier Item Code is present but the row is still Fuzzy/Need Review; forcing
// Exact/100 on top of that would silently override IT's real judgment. See parseImportedRows().
function applyItemCodeExactRule(row) {
  const hasItemCode = !!(row.ocrItemCode && String(row.ocrItemCode).trim());
  return hasItemCode ? { ...row, matchType: "Exact", confidence: 100 } : row;
}

// Fills a deterministic synthetic Character Error Rate for any Fuzzy mock row that doesn't
// already have one hand-specified — keeps the 3-tier pass/fail rule (isRowPassing) exercised
// across the whole mock dataset without hand-editing every row.
function withDefaultCharacterErrorRate(row) {
  if (row.matchType !== "Fuzzy" || row.characterErrorRate !== undefined) return row;
  return { ...row, characterErrorRate: (row.id * 13) % 15 };
}

// Synthetic documentId so the export round-trip (§ document_id) is eyeball-verifiable against
// the mock dataset without needing a real imported file during dev/testing.
function withMockDocumentId(row) {
  return { ...row, documentId: "DOC-" + row.id };
}

const RAW_ROWS = BASE_ROWS.concat(EXTRA_ROWS).map(applyItemCodeExactRule).map(withDefaultCharacterErrorRate).map(withMockDocumentId);

// Validation progress persists in sessionStorage (not localStorage) until export succeeds —
// refreshing the tab must not lose a user's in-progress review of a batch, but fully closing
// the tab/browser and reopening the app later must always start clean (no stale batch from a
// previous session left showing — confirmed with the user, was confusing during testing).
const STORAGE_KEY = "imv_validation_state";
// v5: rows gained freeTextSupplier/freeTextItem flags and selectedItem.isFreeText (§ free-text
// entry) — purely additive, but bumped per this project's practice of bumping on any meaningful
// row-shape change.
const SCHEMA_VERSION = 5;

function loadPersistedRows() {
  try {
    const raw = sessionStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed && parsed.version === SCHEMA_VERSION && Array.isArray(parsed.rows)) {
      return parsed.rows;
    }
    return null;
  } catch {
    return null;
  }
}

function persistRows(rows) {
  try {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ version: SCHEMA_VERSION, rows }));
  } catch {}
}

function clearPersistedRows() {
  try {
    sessionStorage.removeItem(STORAGE_KEY);
  } catch {}
}

// Whitespace/case-insensitive key for item-name comparison. IT's real matched-item-name text
// (from their own pipeline) doesn't always byte-match Supplier Master's spelling exactly — seen
// in real data as spacing drift like "16มมx10ม SD40" vs Master's "16มมx10มSD40" on ~24% of
// distinct Fuzzy matches. Without this, rows IT already marked "no review needed" would still
// fail to auto-select in the dropdown, forcing a manual pick on every one — confirmed with the
// user to loosen matching here rather than leave those rows unresolved.
function normalizeItemName(s) {
  return String(s || "").replace(/\s+/g, "").toLowerCase();
}

function findMasterItem(master, supplier, desc, code) {
  const pool = master[supplier] || [];
  // Item code is a more reliable match key than the free-text name — codes rarely have the
  // spelling/spacing drift that trips up exact name matching, so prefer it when OCR has one.
  if (code) {
    const byCode = pool.find(it => it.supplierItemCode && it.supplierItemCode === code);
    if (byCode) return byCode;
  }
  const exact = pool.find(it => it.supplierItemName === desc);
  if (exact) return exact;
  const normDesc = normalizeItemName(desc);
  if (!normDesc) return null;
  return pool.find(it => normalizeItemName(it.supplierItemName) === normDesc) || null;
}

const FUZZY_CONFIDENCE_THRESHOLD = 92;
// Widened 7.5 -> 9 per the user's revised 3-tier rule (confirmed): tier 1 (>=92%, CER<=7.5) and
// tier 2 (>=92%, CER 7.5-9) now both pass — tier 2 used to be its own "ต้องตรวจ" case but the
// user wants it to pass AND have its Item auto-selected, same as tier 1, since Item auto-fill in
// `displayRows` already follows directly from `isRowPassing()`. Tier 3 (<92%, roughly down to
// ~80%) is unchanged — still "ต้องตรวจ", Item never auto-filled. Do not split this back into a
// separate 7.5/9 branch — a single threshold value is exactly the new rule.
const CHARACTER_ERROR_RATE_THRESHOLD = 9;

// Pass/fail source of truth: this app's OWN confidence/CER bar, applied uniformly to every row
// regardless of what IT's `need_review` column says (confirmed with the user: "ยังไงก็ต้องใช้
// กฎ" — the rule always applies, no matter what need_review's value is). Exact match always
// passes structurally (IT's real file never carries a confidence/CER for Exact Match rows at
// all). Fuzzy passes only when confidence >= 92% AND CER <= 9% (revised threshold, see above).
// `needReviewRaw` (§ parseImportedRows) is parsed and kept on the row but is NOT used to decide
// pass/fail. At the original 7.5% CER threshold this rule was verified to reproduce the exact
// same pass/fail split IT's own need_review implied across all 546 real rows. The CER threshold
// has since been widened to 9% (above) at the user's explicit request — this is now a
// deliberate, acknowledged divergence from IT's need_review for the CER 7.5-9% tier (this app's
// own rule wins, by design, same as before the threshold change).
function isRowPassing(row) {
  if (row.matchType === "Exact") return true;
  const cer = Number(row.characterErrorRate);
  return row.confidence >= FUZZY_CONFIDENCE_THRESHOLD && Number.isFinite(cer) && cer <= CHARACTER_ERROR_RATE_THRESHOLD;
}

function diffStrings(a, b) {
  const n = a.length, m = b.length;
  const dp = Array.from({ length: n + 1 }, () => new Array(m + 1).fill(0));
  for (let i = n - 1; i >= 0; i--) for (let j = m - 1; j >= 0; j--) {
    dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
  }
  let i = 0, j = 0; const aParts = []; const bParts = [];
  while (i < n && j < m) {
    if (a[i] === b[j]) { aParts.push({ ch: a[i], same: true }); bParts.push({ ch: b[j], same: true }); i++; j++; }
    else if (dp[i + 1][j] >= dp[i][j + 1]) { aParts.push({ ch: a[i], same: false }); i++; }
    else { bParts.push({ ch: b[j], same: false }); j++; }
  }
  while (i < n) { aParts.push({ ch: a[i], same: false }); i++; }
  while (j < m) { bParts.push({ ch: b[j], same: false }); j++; }
  return { aParts, bParts };
}

function groupRuns(parts, removedStyle, addedStyle) {
  const runs = [];
  for (const p of parts) {
    const style = p.same ? "" : (removedStyle || addedStyle);
    if (runs.length && runs[runs.length - 1].same === p.same) runs[runs.length - 1].text += p.ch;
    else runs.push({ text: p.ch, same: p.same, style });
  }
  return runs;
}

function styleObj(str) {
  if (!str) return undefined;
  const obj = {};
  str.split(";").forEach(rule => {
    const idx = rule.indexOf(":");
    if (idx === -1) return;
    const prop = rule.slice(0, idx).trim();
    const val = rule.slice(idx + 1).trim();
    if (!prop || !val) return;
    const camel = prop.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    obj[camel] = val;
  });
  return obj;
}

// Bangkok has no DST, but the browser running this app might not be set to Thailand time —
// use Intl explicitly rather than trusting the system's local clock/timezone.
function formatBangkokTimestamp(date) {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Bangkok",
    year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false,
  }).formatToParts(date);
  const get = type => parts.find(p => p.type === type).value;
  return `${get("year")}-${get("month")}-${get("day")} ${get("hour")}:${get("minute")}`;
}

function buildExportRows(displayRows) {
  // Generated fresh per export call (not the import time) — re-exporting later reflects that
  // later moment, not when the batch was first pulled in.
  const exportedAt = formatBangkokTimestamp(new Date());

  // Passthrough columns (unknown-to-this-app headers from the import file, e.g. an ad hoc
  // "Note" column) vary per file — export the union of every header seen across all rows,
  // using each column's own original header text, blank where a row didn't have it.
  const passthroughHeaders = [];
  const seenHeaders = new Set();
  displayRows.forEach(r => Object.keys(r.passthroughFields || {}).forEach(header => {
    if (!seenHeaders.has(header)) { seenHeaders.add(header); passthroughHeaders.push(header); }
  }));

  // Column names/order mirror IT's real input file exactly (confirmed with the user — makes
  // downstream re-processing on IT's side easier, since the output is the input file with
  // review results appended rather than a differently-shaped file). App-added validation
  // columns (Selected Supplier, RVN Item Code/Name, Confirmed By, Exported At) come after all
  // input-mirrored columns; passthrough (unrecognized) columns come last, same as before.
  return displayRows.map(r => {
    const out = {
      "Invoice No": r.invoiceNo,
      "Supplier Name": r.supplierNameOcr,
      "Supplier Item Code": r.ocrItemCode,
      "Item Description": r.ocrDesc,
      "Invoice Qty": r.invQty,
      "Invoice Unit Price": r.invUnitPrice,
      "Invoice Amount ex.VAT": r.invExVat,
      "Invoice UOM": r.invUOM,
    };
    OPTIONAL_IMPORT_COLUMNS.forEach(([header, field]) => {
      out[header] = r[field] !== undefined ? r[field] : "";
    });
    out["Match Type"] = r.matchType;
    out["Matched Item Name"] = r.matchResult;
    out["fuzzing_score"] = r.confidence;
    out["character_error_rate"] = Number.isFinite(r.characterErrorRate) ? r.characterErrorRate : "";
    out["need_review"] = r.needReviewRaw || "";
    out["doc_id"] = r.documentId || "";

    out["Selected Supplier"] = r.selectedSupplier === "— ยังไม่เลือก —" ? "" : r.selectedSupplier;
    out["Selected Item"] = r.selectedItem ? r.selectedItem.supplierItemName : "";
    passthroughHeaders.forEach(header => {
      const value = (r.passthroughFields || {})[header];
      out[header] = value !== undefined ? value : "";
    });
    out["Confirmed By"] = r.isUserConfirmed ? "User" : (r.isAutoFilled ? "Auto" : "");
    out["Exported At"] = exportedAt;
    return out;
  });
}

function buildExportWorkbook(displayRows) {

// Writes the export via the File System Access API's save picker (Chrome/Edge only) when
// available, falling back to a normal download otherwise (Firefox/Safari, or file:// — see
// below). Always prompts fresh, every export — the earlier "remember the picked file and
// silently overwrite it on later exports" behavior (with a "เปลี่ยนไฟล์ปลายทาง" link to reset it)
// was explicitly removed at the user's request: always let the user choose the destination.
// **Do not reintroduce a remembered/reused file handle for export.**
// The File System Access API (showOpenFilePicker/showSaveFilePicker) reports as available
// under file:// origins in Chromium/Edge, but writes made via createWritable() have been
// observed to silently produce a corrupted .xlsx (no error thrown, but Excel reports "file
// format or extension is not valid") on at least one real Windows/Edge local setup — likely an
// OS/AV-level interaction with the atomic swap-file rename the API does on close(). Since
// file:// is exactly how this app gets opened when double-clicked locally (the common
// non-Codespace workflow), the native picker path is disabled there entirely; the classic
// <input>/download fallback below has been verified reliable end-to-end and is used instead.
function supportsFileSystemAccess() {
  return location.protocol !== "file:" && !!window.showOpenFilePicker && !!window.showSaveFilePicker;
}

async function writeExportFile(displayRows) {
  const wb = buildExportWorkbook(displayRows);

  if (supportsFileSystemAccess()) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: "Item_Mapping_Validated.xlsx",
        types: [{ description: "Excel file", accept: { "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": [".xlsx"] } }],
      });
      const bytes = XLSX.write(wb, { bookType: "xlsx", type: "array" });
      const writable = await handle.createWritable();
      await writable.write(bytes);
      await writable.close();
      return true;
    } catch (err) {
      if (err && err.name === "AbortError") return false; // user cancelled the picker
      // any other error: fall through to the classic download below
    }
  }

  const dateStr = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `Item_Mapping_Validated_${dateStr}.xlsx`);
  return true;
}
